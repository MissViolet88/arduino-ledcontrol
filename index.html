<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRAFFICCTL / ESP32 — BUILT-IN LED FIXED</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ffffff;
            --bg2: #f5f3ff;
            --surface: #faf9ff;
            --border: #e4deff;
            --border2: #c4b5fd;
            --text: #3b1f6e;
            --text-dim: #7c5cb4;
            --text-muted: #b8a8d8;
            --accent: #7c3aed;
            --accent2: #5b21b6;
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.35);
            --red-dim: #fef2f2;
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.35);
            --yellow-dim: #fffbeb;
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.35);
            --green-dim: #ecfdf5;
            --builtin: #7c3aed;
            --builtin-glow: rgba(124, 58, 237, 0.3);
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 15px;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(124, 58, 237, 0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            border-bottom: 1px solid var(--border2);
            padding-bottom: 18px;
            margin-bottom: 28px;
        }

        .logo-block .sys-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .logo-block h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text);
            line-height: 1;
        }

        .logo-block h1 span {
            color: var(--accent);
        }

        .status-bar {
            text-align: right;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        .status-bar .conn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--text-dim);
        }

        .status-bar .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background .4s, box-shadow .4s;
        }

        .status-bar .dot.live {
            background: var(--accent);
            box-shadow: 0 0 8px var(--builtin-glow);
            animation: pulse 2s infinite;
        }

        .status-bar .time-display {
            color: var(--text-dim);
            margin-top: 5px;
            font-size: 10px;
            letter-spacing: 1px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(124, 58, 237, 0.04);
        }

        .panel-header .ph-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .panel-header .ph-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border2);
        }

        .panel-body {
            padding: 16px;
        }

        .tl-panel .panel-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 16px;
        }

        .traffic-light-housing {
            width: 90px;
            background: #f0ecff;
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .traffic-light-housing::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: linear-gradient(180deg, var(--border2), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
        }

        .tl-lens {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2px solid #ddd4ff;
            background: #e8e0ff;
            position: relative;
            transition: background .4s, box-shadow .6s;
        }

        .tl-lens::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 12px;
            width: 10px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .tl-lens.red-active {
            background: var(--red);
            box-shadow: 0 0 24px 6px var(--red-glow), inset 0 0 12px rgba(255, 255, 255, 0.1);
        }

        .tl-lens.yellow-active {
            background: var(--yellow);
            box-shadow: 0 0 24px 6px var(--yellow-glow), inset 0 0 12px rgba(255, 255, 255, 0.1);
        }

        .tl-lens.green-active {
            background: var(--green);
            box-shadow: 0 0 24px 6px var(--green-glow), inset 0 0 12px rgba(255, 255, 255, 0.1);
        }

        .countdown-ring {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .countdown-ring svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-bg {
            fill: none;
            stroke: var(--border2);
            stroke-width: 4;
        }

        .ring-fill {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset .9s linear, stroke .4s;
        }

        .countdown-ring .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .countdown-ring .ring-center .cnt-num {
            font-family: var(--font-mono);
            font-size: 28px;
            color: var(--text);
            line-height: 1;
        }

        .countdown-ring .ring-center .cnt-unit {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .phase-label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 2px;
            color: var(--text-dim);
            border: 1px solid var(--border);
            transition: color .4s, border-color .4s, background .4s;
        }

        .phase-label.red {
            color: var(--red);
            border-color: var(--red);
            background: var(--red-dim);
        }

        .phase-label.yellow {
            color: var(--yellow);
            border-color: var(--yellow);
            background: var(--yellow-dim);
        }

        .phase-label.green {
            color: var(--green);
            border-color: var(--green);
            background: var(--green-dim);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 14px;
            border: 1px solid var(--border2);
            border-radius: 3px;
            background: var(--bg2);
            color: var(--text-dim);
            cursor: pointer;
            transition: all .2s;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity .2s;
        }

        .btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: #f0ecff;
        }

        .btn.active {
            border-color: currentColor;
            color: var(--text);
            background: #ede9ff;
            box-shadow: 0 0 8px rgba(124, 58, 237, 0.2);
        }

        .btn.traffic-btn {
            color: var(--green);
        }

        .btn.traffic-btn.active {
            color: #059669;
            background: var(--green-dim);
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.2);
        }

        .btn.off-btn {
            color: var(--red);
        }

        .btn.off-btn.active {
            color: #dc2626;
            background: var(--red-dim);
        }

        .btn.red-btn.active {
            background: var(--red-dim);
        }

        .btn.yellow-btn.active {
            background: var(--yellow-dim);
        }

        .btn.green-btn.active {
            background: var(--green-dim);
        }

        .btn.builtin-btn {
            color: var(--accent);
        }

        .btn.builtin-btn.active {
            background: var(--green-dim);
            color: #059669;
            border-color: #059669;
        }

        .btn.builtin-off-btn.active {
            background: var(--red-dim);
            color: #dc2626;
            border-color: #dc2626;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .section-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-cell {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 12px 14px;
        }

        .stat-cell .sc-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-cell .sc-value {
            font-family: var(--font-mono);
            font-size: 18px;
            color: var(--text);
            line-height: 1;
        }

        .stat-cell .sc-value.green {
            color: var(--green);
        }

        .stat-cell .sc-value.yellow {
            color: var(--yellow);
        }

        .stat-cell .sc-value.red {
            color: var(--red);
        }

        .stat-cell .sc-value.accent {
            color: var(--accent);
        }

        .log-panel {
            flex: 1;
        }

        .log-list {
            list-style: none;
            max-height: 340px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .log-list::-webkit-scrollbar {
            width: 4px;
        }

        .log-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-list::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .log-item {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(17, 34, 51, 0.6);
            animation: fadeIn .35s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .log-item .li-time {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            min-width: 90px;
        }

        .log-item .li-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .log-item .li-msg {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .log-item.ev-green .li-dot {
            background: var(--green);
        }

        .log-item.ev-yellow .li-dot {
            background: var(--yellow);
        }

        .log-item.ev-red .li-dot {
            background: var(--red);
        }

        .log-item.ev-blue .li-dot {
            background: var(--accent);
        }

        .log-item.ev-off .li-dot {
            background: var(--text-muted);
        }

        .log-item.ev-green .li-msg {
            color: #059669;
        }

        .log-item.ev-yellow .li-msg {
            color: #d97706;
        }

        .log-item.ev-red .li-msg {
            color: #dc2626;
        }

        .log-item.ev-blue .li-msg {
            color: var(--accent);
        }

        .toast-area {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            padding: 8px 16px;
            background: #fff;
            border: 1px solid var(--border2);
            border-left: 3px solid var(--accent);
            color: var(--text);
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.15);
            animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
            pointer-events: auto;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .builtin-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 8px;
            background: var(--text-muted);
            transition: all 0.3s;
        }

        .builtin-indicator.on {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        @media (max-width: 700px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .status-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

        const ACTIVE_BTN_IDS = ['btn-traffic-on', 'btn-traffic-off', 'btn-red', 'btn-yellow', 'btn-green', 'btn-builtin-on', 'btn-builtin-off'];

        function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.getElementById('toast-area').appendChild(t); setTimeout(() => t.remove(), 3200); }
        function fmt(d) { return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
        function setConnected(ok) { document.getElementById('conn-dot').classList.toggle('live', ok); document.getElementById('conn-label').textContent = ok ? 'SUPABASE LIVE' : 'OFFLINE'; }
        setInterval(() => document.getElementById('clock').textContent = fmt(new Date()), 1000);
        setInterval(() => { const s = Math.floor((Date.now() - startTime) / 1000); const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60; document.getElementById('stat-uptime').textContent = h ? `${h}h ${m}m` : m ? `${m}m ${sec}s` : `${sec}s`; }, 1000);

        function updateBuiltinIndicator() {
            if (builtinLEDState) {
                builtinStatus.classList.add('on');
                builtinStatus.style.background = 'var(--accent)';
            } else {
                builtinStatus.classList.remove('on');
                builtinStatus.style.background = 'var(--text-muted)';
            }
        }

        function setActiveBtn(id) {
            ACTIVE_BTN_IDS.forEach(bid => {
                const el = document.getElementById(bid);
                if (el) {
                    el.classList.remove('active');
                    // Remove specific classes for built-in buttons
                    if (bid === 'btn-builtin-on') el.classList.remove('builtin-btn-active');
                    if (bid === 'btn-builtin-off') el.classList.remove('builtin-off-btn-active');
                }
            });
            if (id) {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('active');
                    // Add specific styling for built-in buttons
                    if (id === 'btn-builtin-on') el.classList.add('builtin-btn-active');
                    if (id === 'btn-builtin-off') el.classList.add('builtin-off-btn-active');
                }
            }
        }

        function setLens(phase) { ['red', 'yellow', 'green'].forEach(c => { lens[c].className = 'tl-lens' + (phase === c ? ` ${c}-active` : ''); }); }
        function setPhaseLabel(phase) { const map = { green: 'GO', yellow: 'READY', red: 'STOP', none: 'IDLE', idle: 'IDLE', builtin: 'BUILT-IN', manual: 'MANUAL' }; phaseLabelEl.textContent = (map[phase] || phase).toUpperCase(); phaseLabelEl.className = 'phase-label ' + (phase === 'green' ? 'green' : phase === 'yellow' ? 'yellow' : phase === 'red' ? 'red' : ''); }
        function updateRing(sec, max, phase) { const circumference = 276.46; const offset = circumference - (sec / max) * circumference; ringFill.style.strokeDashoffset = Math.max(0, Math.min(circumference, offset)); const colorMap = { green: 'var(--green)', yellow: 'var(--yellow)', red: 'var(--red)' }; ringFill.style.stroke = colorMap[phase] || 'var(--text-dim)'; cntNum.textContent = (sec > 0 && sec <= 999) ? sec : '--'; }
        function updateStatsUI() { statPhase.textContent = (currentPhaseUI === 'none' ? '--' : currentPhaseUI.toUpperCase()); statPhase.className = 'sc-value ' + (currentPhaseUI === 'green' ? 'green' : currentPhaseUI === 'yellow' ? 'yellow' : currentPhaseUI === 'red' ? 'red' : ''); statEntries.textContent = logEntries.length; statCycles.textContent = cyclesDone; }
        function setModeDisplay(mode) { const map = { idle: 'IDLE', traffic: 'CYCLE', red_only: 'RED (MANUAL)', yellow_only: 'YELLOW (MANUAL)', green_only: 'GREEN (MANUAL)', builtin_only: 'BUILT-IN' }; statMode.textContent = map[mode] || mode.toUpperCase(); }

        function addLogUI(event, timestamp) { const time = timestamp ? new Date(timestamp) : new Date(); logEntries.unshift({ event, time }); const emptyDiv = document.getElementById('log-empty'); if (emptyDiv) emptyDiv.remove(); const li = document.createElement('li'); let cls = 'ev-off'; if (event.toLowerCase().includes('green')) cls = 'ev-green'; else if (event.toLowerCase().includes('yellow')) cls = 'ev-yellow'; else if (event.toLowerCase().includes('red')) cls = 'ev-red'; else if (event.toLowerCase().includes('built')) cls = 'ev-blue'; li.className = `log-item ${cls}`; li.innerHTML = `<span class="li-time">${fmt(time)}</span><span class="li-dot"></span><span class="li-msg">${event}</span>`; logList.insertBefore(li, logList.firstChild); while (logList.children.length > 80) logList.removeChild(logList.lastChild); statEntries.textContent = logEntries.length; }
        function clearLogs() { logEntries = []; logList.innerHTML = '<div class="log-empty" id="log-empty">No events recorded</div>'; statEntries.textContent = '0'; toast('Logs cleared locally'); }

        function stopCountdownAndCycle() { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } if (cycleTimer) { clearTimeout(cycleTimer); cycleTimer = null; } }
        function startLocalCountdown(phase, secondsLeft) { stopCountdownAndCycle(); currentPhaseUI = phase; localCountdownValue = secondsLeft; localMaxCountdown = PHASE_DUR[phase] || 60; setLens(phase); setPhaseLabel(phase); updateRing(localCountdownValue, localMaxCountdown, phase); updateStatsUI(); countdownTimer = setInterval(() => { if (localCountdownValue > 0) { localCountdownValue--; updateRing(localCountdownValue, localMaxCountdown, currentPhaseUI); } else { if (countdownTimer) clearInterval(countdownTimer); countdownTimer = null; } }, 1000); }

        function applyLocalStateFromAction(action) {
            stopCountdownAndCycle();
            setActiveBtn(null);
            if (action === 'traffic_on') {
                activeMode = 'traffic';
                setModeDisplay('traffic');
                setActiveBtn('btn-traffic-on');
                startTrafficCycleUI();
            } else if (action === 'all_off') {
                activeMode = 'idle';
                setModeDisplay('idle');
                setActiveBtn('btn-traffic-off');
                cyclesDone = 0;
                statCycles.textContent = 0;
                currentPhaseUI = 'none';
                setLens('none');
                setPhaseLabel('none');
                updateRing(0, 60, 'none');
                updateStatsUI();
            } else if (action === 'red_on') {
                activeMode = 'red_only';
                setModeDisplay('red_only');
                setActiveBtn('btn-red');
                setLens('red');
                setPhaseLabel('red');
                currentPhaseUI = 'red';
                updateRing(0, 60, 'red');
                updateStatsUI();
            } else if (action === 'yellow_on') {
                activeMode = 'yellow_only';
                setModeDisplay('yellow_only');
                setActiveBtn('btn-yellow');
                setLens('yellow');
                setPhaseLabel('yellow');
                currentPhaseUI = 'yellow';
                updateRing(0, 60, 'yellow');
                updateStatsUI();
            } else if (action === 'green_on') {
                activeMode = 'green_only';
                setModeDisplay('green_only');
                setActiveBtn('btn-green');
                setLens('green');
                setPhaseLabel('green');
                currentPhaseUI = 'green';
                updateRing(0, 60, 'green');
                updateStatsUI();
            } else if (action === 'builtin_on') {
                activeMode = 'builtin_only';
                setModeDisplay('builtin_only');
                setActiveBtn('btn-builtin-on');
                builtinLEDState = true;
                updateBuiltinIndicator();
                setPhaseLabel('builtin');
                // Don't show toast here - it's handled by the command response
            } else if (action === 'builtin_off') {
                setActiveBtn('btn-builtin-off');
                builtinLEDState = false;
                updateBuiltinIndicator();
                if (activeMode === 'builtin_only') {
                    activeMode = 'idle';
                    setModeDisplay('idle');
                }
                setPhaseLabel('none');
                // Don't show toast here - it's handled by the command response
            }
        }

        function startTrafficCycleUI() { let idx = 0; function nextPhase() { if (activeMode !== 'traffic') return; const ph = PHASE_SEQ[idx]; startLocalCountdown(ph, PHASE_DUR[ph]); idx = (idx + 1) % PHASE_SEQ.length; if (idx === 0) { cyclesDone++; statCycles.textContent = cyclesDone; } cycleTimer = setTimeout(nextPhase, PHASE_DUR[ph] * 1000); } nextPhase(); }

        async function sendCommand(action) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/traffic_control`, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify({ action, active: true })
                });
                if (!res.ok) throw new Error(await res.text());
                statLastCmd.textContent = action.toUpperCase();
                toast(`CMD → ${action.toUpperCase()}`);
                setConnected(true);
            } catch (e) {
                console.error(e);
                toast(`ERROR: ${e.message}`);
                setConnected(false);
            }
        }

        async function pollLogsAndState() {
            try {
                const logsRes = await fetch(`${SUPABASE_URL}/rest/v1/traffic_logs?order=created_at.desc&limit=50`,
                    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
                if (!logsRes.ok) throw new Error();
                const rows = await logsRes.json();
                setConnected(true);
                const ul = logList;
                const existingEvents = new Set();
                Array.from(ul.querySelectorAll('.log-item .li-msg')).forEach(el => existingEvents.add(el.innerText));
                rows.reverse().forEach(r => {
                    const ev = r.event;
                    if (!existingEvents.has(ev) && ev) {
                        addLogUI(ev, r.created_at);
                        existingEvents.add(ev);
                        // Update built-in LED state based on logs
                        if (ev.includes('Built-in ON')) {
                            builtinLEDState = true;
                            updateBuiltinIndicator();
                            if (activeMode !== 'builtin_only') {
                                activeMode = 'builtin_only';
                                setModeDisplay('builtin_only');
                            }
                            setActiveBtn('btn-builtin-on');
                        } else if (ev.includes('Built-in OFF')) {
                            builtinLEDState = false;
                            updateBuiltinIndicator();
                            if (activeMode === 'builtin_only') {
                                activeMode = 'idle';
                                setModeDisplay('idle');
                            }
                            setActiveBtn('btn-builtin-off');
                        }
                    }
                });
                if (rows.length === 0 && ul.children.length === 0) ul.innerHTML = '<div class="log-empty" id="log-empty">No events recorded</div>';
            } catch (e) {
                setConnected(false);
            }
        }

        async function syncHeartbeat() {
            try {
                const cmdRes = await fetch(`${SUPABASE_URL}/rest/v1/traffic_control?order=created_at.desc&limit=1`,
                    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
                if (cmdRes.ok) {
                    const cmds = await cmdRes.json();
                    if (cmds.length && cmds[0].active === true) {
                        const lastAction = cmds[0].action;
                        if (lastAction) {
                            applyLocalStateFromAction(lastAction);
                        }
                    }
                }
            } catch (e) { }
        }

        // Attach event listeners
        document.getElementById('btn-traffic-on').addEventListener('click', () => sendCommand('traffic_on'));
        document.getElementById('btn-traffic-off').addEventListener('click', () => sendCommand('all_off'));
        document.getElementById('btn-red').addEventListener('click', () => sendCommand('red_on'));
        document.getElementById('btn-yellow').addEventListener('click', () => sendCommand('yellow_on'));
        document.getElementById('btn-green').addEventListener('click', () => sendCommand('green_on'));
        document.getElementById('btn-builtin-on').addEventListener('click', () => sendCommand('builtin_on'));
        document.getElementById('btn-builtin-off').addEventListener('click', () => sendCommand('builtin_off'));
        document.getElementById('clearLogBtn').addEventListener('click', clearLogs);

        // Initial UI sync
        applyLocalStateFromAction('all_off');
        updateBuiltinIndicator();
        setConnected(false);
        pollLogsAndState();
        setInterval(pollLogsAndState, 2800);
        setInterval(syncHeartbeat, 4500);
        toast("✅ Connected · Built-in LED fixed (Active LOW)");
    </script>
</body>
